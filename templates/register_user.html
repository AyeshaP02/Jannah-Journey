 <!--Registration form for student and Teacher-->
 <!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <style>
        body { font-family: Arial; background: #f5f5f5; display: flex; justify-content: center; padding: 60px; }
        .box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #333; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        .error { color: red; text-align: center; }
        .link { text-align: center; margin-top: 15px; }
    </style>

</head>

<body>

<div class="box">
    <h2>Register</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST" action="/register">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <select name="role">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>
        <button type="submit">Register</button>
    </form>
    <p class="link">Already have an account? <a href="/login">Login</a></p>

</div>

</body>
</html>
