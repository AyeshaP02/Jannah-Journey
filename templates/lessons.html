

<!DOCTYPE html>
<html>
<head>
    <title>Lesson Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h2>Lesson Library</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Topic</th>
        <th>Content</th>
    </tr>

    {% for lesson in lessons %}
    <tr>
        <td>{{ lesson[0] }}</td>
        <td>{{ lesson[1] }}</td>
        <td>{{ lesson[2] }}</td>
        <td>{{ lesson[3] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/create_lesson">Create New Lesson</a>

</body>
</html>
